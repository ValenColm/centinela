name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --ignore=E402,F401
        continue-on-error: true

  deploy:
    name: Deploy to Azure
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-centinela \
            --template-file infra/main.bicep \
            --output table

      # Nota: create-functions.sh se corre manualmente (Valentina)
      # porque el SP de CI no tiene permisos para asignar roles RBAC.
      # Comando: bash infra/create-functions.sh
